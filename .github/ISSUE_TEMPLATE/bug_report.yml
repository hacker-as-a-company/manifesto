name: Bug report
description: Report a problem or broken behavior
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Environment, links, or screenshots
